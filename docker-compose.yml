name: playto_project

services:
  db:
    image: postgres:15-alpine
    container_name: playto_db
    environment:
      POSTGRES_DB: playto
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - playto_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: playto_redis
    ports:
      - "6380:6379"

  backend:
    build:
      context: ./backend
    container_name: playto_backend
    command: sh -c "sleep 5 && python manage.py makemigrations merchants ledger payouts idempotency && python manage.py migrate && python seed.py && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8001:8000"
    environment:
      DEBUG: "True"
      DB_HOST: db
      DB_NAME: playto
      DB_USER: postgres
      DB_PASSWORD: postgres
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis

  celery_worker:
    build:
      context: ./backend
    container_name: playto_worker
    command: celery -A project worker --loglevel=info --concurrency=2
    volumes:
      - ./backend:/app
    environment:
      DEBUG: "True"
      DB_HOST: db
      DB_NAME: playto
      DB_USER: postgres
      DB_PASSWORD: postgres
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis

  frontend:
    build:
      context: ./frontend
    container_name: playto_frontend
    ports:
      - "5174:5173"
    environment:
      VITE_API_URL: http://localhost:8001
    depends_on:
      - backend

volumes:
  playto_pg_data: